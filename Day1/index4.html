<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- for encoding  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- for responsive -->
    <link
      rel="shortcut icon"
      href="https://plus.unsplash.com/premium_vector-1720440392337-19d655a14b98?w=352&dpr=1&h=367&auto=format&fit=crop&q=60&ixlib=rb-4.1.0"
      type="image/x-icon"
    />
    <title>Home</title>
  </head>
  <body>
    <h1>my photo list</h1>
    <img src="./bird.avif" alt="bird" />
    <img src="./Photo/cat.avif" alt="cat" />
    <img src="../Photo2/polarbear.avif" alt="bear" />
    <h1>My video list</h1>
    <video src="city.mp4" controls width="400" autoplay loop></video>
    <h1>music list</h1>
    <audio src="./Music/water.mp3" controls autoplay loop></audio>
    <h1>youtube video list</h1>
    <iframe src="./city.mp4" frameborder="0"></iframe>
    <iframe
      width="800"
      height="500"
      src="https://www.youtube.com/embed/D2ofOFDgjTE?si=86BoH7whhKq0E47S"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
